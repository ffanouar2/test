    <style>
        /* --- Basis & Layout --- */
        :root {
            --primary-glow: hsl(190, 100%, 50%);
            --secondary-glow: hsl(210, 100%, 60%);
            --bg-color: #080808;
            --glass-bg: rgba(20, 20, 20, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .smooth-colors, .smooth-colors * { transition: all 0.4s ease; }
        .fast-colors, .fast-colors * { transition: none !important; }

        @keyframes altRainbowWave {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        body.alt-rainbow-mode { animation: altRainbowWave 4s linear infinite; }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .zone {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* --- Rekenmachine --- */
        #calculator {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px var(--primary-glow);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #calc-header {
            text-align: center;
            font-size: 17px;
            letter-spacing: 3px;
            color: var(--primary-glow);
            font-weight: bold;
            margin-bottom: -5px;
        }

        #display-container { position: relative; }

        #display {
            width: 100%;
            height: 75px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 32px;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        #brand-name {
            position: absolute;
            left: 10px;
            top: 5px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button.calc-btn {
            padding: 20px;
            font-size: 18px;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        button.calc-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-glow);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button.calc-btn:active { transform: translateY(1px); }
        
        .btn-divide { color: hsl(280, 100%, 65%); background: rgba(255,255,255,0.08); font-weight: bold; }
        .btn-multiply { color: hsl(60, 100%, 50%); background: rgba(255,255,255,0.08); font-weight: bold; }
        .btn-subtract { color: hsl(0, 100%, 65%); background: rgba(255,255,255,0.08); font-weight: bold; }
        .btn-add { color: hsl(120, 100%, 50%); background: rgba(255,255,255,0.08); font-weight: bold; }
        
        .equals { background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow)); color: #000; font-weight: bold; grid-column: span 2; }
        .clear { background: rgba(255, 68, 68, 0.15); color: #ff4444; }

        /* --- AI Menu --- */
        #ai-menu {
            flex-direction: column;
            gap: 30px;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #menu-title {
            font-size: 45px;
            margin: 0;
            background: linear-gradient(to right, var(--primary-glow), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px var(--primary-glow);
            text-align: center;
        }

        .ai-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
        }

        .ai-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }

        .ai-card:hover {
            border-color: var(--primary-glow);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px var(--primary-glow);
            background: rgba(255,255,255,0.08);
        }

        .ai-card h3 { margin: 0 0 10px 0; font-size: 22px; color: var(--primary-glow); }
        .ai-card p { margin: 0; font-size: 13px; color: #aaa; }

        #esc-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body class="smooth-colors">

    <canvas id="bg-canvas"></canvas>

    <div id="calculator-zone" class="zone">
        <div id="calculator">
            <div id="calc-header">ANOUAR 3ORLO</div>
            <div id="display-container">
                <span id="brand-name">CALCULATOR</span>
                <input type="text" id="display" disabled>
            </div>
            <div class="buttons">
                <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                <button class="calc-btn btn-divide" onclick="appendValue('/')">/</button>
                <button class="calc-btn btn-multiply" onclick="appendValue('*')">×</button>
                <button class="calc-btn btn-subtract" onclick="appendValue('-')">-</button>

                <button class="calc-btn" onclick="appendValue('7')">7</button>
                <button class="calc-btn" onclick="appendValue('8')">8</button>
                <button class="calc-btn" onclick="appendValue('9')">9</button>
                <button class="calc-btn btn-add" onclick="appendValue('+')">+</button>

                <button class="calc-btn" onclick="appendValue('4')">4</button>
                <button class="calc-btn" onclick="appendValue('5')">5</button>
                <button class="calc-btn" onclick="appendValue('6')">6</button>
                <button class="calc-btn" onclick="appendValue('.')">.</button>

                <button class="calc-btn" onclick="appendValue('1')">1</button>
                <button class="calc-btn" onclick="appendValue('2')">2</button>
                <button class="calc-btn" onclick="appendValue('3')">3</button>
                <button class="calc-btn" onclick="appendValue('0')">0</button>
                
                <button class="calc-btn equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <div id="menu-zone" class="zone hidden">
        <div id="ai-menu">
            <h1 id="menu-title">AI BY ANOUAR</h1>
            <div class="ai-grid">
                <div class="ai-card" onclick="window.location.replace('https://chatgpt.com/')">
                    <h3>ChatGPT</h3>
                    <p>OpenAI</p>
                </div>
                <div class="ai-card" onclick="window.location.replace('https://gemini.google.com/')">
                    <h3>Gemini</h3>
                    <p>Google AI</p>
                </div>
                 <div class="ai-card" onclick="window.location.replace('https://claude.ai/')">
                    <h3>Claude</h3>
                    <p>Anthropic</p>
                </div>
                <div class="ai-card" onclick="window.location.replace('https://www.perplexity.ai/')">
                    <h3>Perplexity</h3>
                    <p>AI Zoekmachine</p>
                </div>
                <div class="ai-card" onclick="window.location.replace('https://copilot.microsoft.com/')">
                    <h3>Copilot</h3>
                    <p>Microsoft AI</p>
                </div>
                <div class="ai-card" onclick="window.location.replace('https://huggingface.co/chat/')">
                    <h3>HuggingChat</h3>
                    <p>Open Source AI</p>
                </div>
            </div>
            <div id="esc-hint">Let op: AI opent in dit venster en wist deze kluis-pagina!<br>Druk 5x snel op ESC om menu te sluiten.</div>
        </div>
    </div>

    <script>
        // --- 1. VARIABELEN ---
        const calcDisplay = document.getElementById('display');
        const calcZone = document.getElementById('calculator-zone');
        const menuZone = document.getElementById('menu-zone');
        
        let currentParticleColor = 'hsl(190, 100%, 50%)'; 
        document.documentElement.style.setProperty('--primary-glow', currentParticleColor);

        // --- 2. THEMA KLEUR FUNCTIE ---
        function setThemeColor(hue) {
            hue = Math.abs(hue % 360);
            const newColor = `hsl(${hue}, 100%, 50%)`;
            const newSecondary = `hsl(${hue + 40}, 100%, 60%)`;
            
            document.documentElement.style.setProperty('--primary-glow', newColor);
            document.documentElement.style.setProperty('--secondary-glow', newSecondary);
            
            currentParticleColor = newColor;
            particlesArray.forEach(p => p.color = currentParticleColor);
        }

        // --- 3. REGENBOOG FUNCTIE VOOR '=' ---
        let isRainbowActive = false;
        function triggerRainbow() {
            if(isRainbowActive) return;
            isRainbowActive = true;
            
            document.body.classList.remove('smooth-colors');
            document.body.classList.add('fast-colors');
            
            let hue = 0;
            let cycles = 0;
            
            let rainbowInterval = setInterval(() => {
                hue += 15; 
                setThemeColor(hue);
                
                if(hue >= 360) {
                    hue = 0;
                    cycles++;
                }
                
                if(cycles >= 2) {
                    clearInterval(rainbowInterval);
                    document.body.classList.remove('fast-colors');
                    document.body.classList.add('smooth-colors');
                    isRainbowActive = false;
                }
            }, 30);
        }

        // --- 4. REKENMACHINE FUNCTIES ---
        function appendValue(value) { 
            if (calcDisplay.value === 'ERROR') calcDisplay.value = '';
            calcDisplay.value += value; 
            
            if (/[0-9]/.test(value)) {
                const number = parseInt(value);
                setThemeColor(number * 36);
            } 
            else if (value === '+') setThemeColor(120); 
            else if (value === '-') setThemeColor(0);   
            else if (value === '*') setThemeColor(60);  
            else if (value === '/') setThemeColor(280); 
        }
        
        function clearDisplay() { calcDisplay.value = ''; }
        
        function calculate() {
            triggerRainbow();
            
            const input = calcDisplay.value;
            
            if (input === '1+1') {
                setTimeout(() => { 
                    calcZone.classList.add('hidden');
                    menuZone.classList.remove('hidden');
                    clearDisplay();
                }, 300);
                return;
            }

            if(input.trim() === '') return;
            
            try {
                let safeInput = input.replace(/[^-()\d/*+.]/g, '');
                calcDisplay.value = Function('"use strict";return (' + safeInput + ')')();
            } catch (error) {
                calcDisplay.value = 'ERROR';
                setTimeout(clearDisplay, 1500);
            }
        }

        // --- 5. TOETSENBORD LOGICA & ESCAPE ---
        let escCount = 0;
        let lastEscTime = 0;

        document.addEventListener('keydown', (e) => {
            
            if (e.key === 'Alt') {
                e.preventDefault();
                document.body.classList.toggle('alt-rainbow-mode');
            }

            if (e.ctrlKey && e.code.startsWith('Key')) {
                e.preventDefault(); 
                const letterIndex = e.code.charCodeAt(3) - 65; 
                setThemeColor(letterIndex * (360 / 26));
            }

            const isCalcVisible = !calcZone.classList.contains('hidden');

            // REKENMACHINE BEDIENING
            if (isCalcVisible && !e.ctrlKey && !e.altKey) {
                if (/[0-9+\-*/.]/.test(e.key)) {
                    appendValue(e.key);
                } else if (e.key === 'Enter' || e.key === '=') {
                    calculate();
                } else if (e.key === 'Backspace') {
                    if (calcDisplay.value !== 'ERROR') calcDisplay.value = calcDisplay.value.slice(0, -1);
                } else if (e.key.toLowerCase() === 'c') {
                    clearDisplay();
                }
            }

            // ESCAPE LOGICA
            if (e.key === 'Escape') {
                if (isCalcVisible) {
                    clearDisplay(); // Wis de rekenmachine als die open is
                } else {
                    // Menu is open, tel 5x ESC binnen 500ms per klik
                    const currentTime = new Date().getTime();
                    if (currentTime - lastEscTime < 500) { escCount++; } 
                    else { escCount = 1; }
                    lastEscTime = currentTime;

                    if (escCount === 5) {
                        menuZone.classList.add('hidden');
                        calcZone.classList.remove('hidden');
                        escCount = 0; // Reset na succes
                    }
                }
            }
        });

        // --- 6. ACHTERGROND ANIMATIE ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x; mouse.y = event.y;
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; 
                this.color = currentParticleColor;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius) {
                    this.x -= dx/20;
                    this.y -= dy/20;
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 4500; 
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        let opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = currentParticleColor;
                        ctx.globalAlpha = opacityValue;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1.0; 
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0,0,innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        initParticles();
        animate();
    </script>
</body>
