<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anouar's Portal</title>
    <style>
        /* --- Basis & Layout --- */
        :root {
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --bg-color: #050505;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Canvas Achtergrond --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- Algemene Zones --- */
        .zone {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* --- Rekenmachine (ANOUAR 3ORLO) --- */
        #calculator {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(0, 242, 254, 0.2);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #calc-header {
            text-align: center;
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--primary-glow);
            font-weight: bold;
            margin-bottom: -5px;
        }

        #display-container {
            position: relative;
        }

        #display {
            width: 100%;
            height: 75px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 32px;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        #brand-name {
            position: absolute;
            left: 10px;
            top: 5px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button.calc-btn {
            padding: 20px;
            font-size: 18px;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.2s ease;
        }

        button.calc-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-glow);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        button.calc-btn:active {
            transform: translateY(1px);
        }

        .operator { background: rgba(79, 172, 254, 0.15); color: var(--primary-glow); font-weight: bold; }
        .equals { background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow)); color: #000; font-weight: bold; grid-column: span 2; }
        .clear { background: rgba(255, 68, 68, 0.15); color: #ff4444; }

        /* --- Game Menu --- */
        #game-menu {
            flex-direction: column;
            gap: 30px;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        #menu-title {
            font-size: 45px;
            margin: 0;
            background: linear-gradient(to right, var(--primary-glow), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            text-align: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            border-color: var(--primary-glow);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.2);
            background: rgba(255,255,255,0.08);
        }

        .game-card h3 { margin: 0 0 10px 0; font-size: 22px; color: var(--primary-glow); }
        .game-card p { margin: 0; font-size: 13px; color: #aaa; }

        #esc-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }

        /* --- Game Container (Iframe) --- */
        #game-container {
            width: 100vw;
            height: 100vh;
            background: black;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #panic-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        #panic-button:hover {
            background: rgba(255,0,0,0.8);
            color: white;
            border-color: red;
            box-shadow: 0 0 15px red;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="calculator-zone" class="zone">
        <div id="calculator">
            <div id="calc-header">ANOUAR 3ORLO</div>
            <div id="display-container">
                <span id="brand-name">CALCULATOR</span>
                <input type="text" id="display" disabled>
            </div>
            <div class="buttons">
                <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                <button class="calc-btn operator" onclick="appendValue('/')">/</button>
                <button class="calc-btn operator" onclick="appendValue('*')">×</button>
                <button class="calc-btn operator" onclick="appendValue('-')">-</button>

                <button class="calc-btn" onclick="appendValue('7')">7</button>
                <button class="calc-btn" onclick="appendValue('8')">8</button>
                <button class="calc-btn" onclick="appendValue('9')">9</button>
                <button class="calc-btn operator" onclick="appendValue('+')">+</button>

                <button class="calc-btn" onclick="appendValue('4')">4</button>
                <button class="calc-btn" onclick="appendValue('5')">5</button>
                <button class="calc-btn" onclick="appendValue('6')">6</button>
                <button class="calc-btn" onclick="appendValue('.')">.</button>

                <button class="calc-btn" onclick="appendValue('1')">1</button>
                <button class="calc-btn" onclick="appendValue('2')">2</button>
                <button class="calc-btn" onclick="appendValue('3')">3</button>
                <button class="calc-btn" onclick="appendValue('0')">0</button>
                
                <button class="calc-btn equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <div id="menu-zone" class="zone hidden">
        <div id="game-menu">
            <h1 id="menu-title">GAMES BY ANOUAR</h1>
            <div class="game-grid">
                <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/rvvASMiM6113cg9nwg3piT9nE1OQhJg3/')">
                    <h3>RACING</h3>
                    <p>Hoge snelheid</p>
                </div>
                <div class="game-card" onclick="openGame('https://game.crazygames.com/en/voxiom-io/index.html')">
                    <h3>VOXIOM.IO</h3>
                    <p>CrazyGames FPS</p>
                </div>
                <div class="game-card" onclick="openGame('https://www.mathgames.com/play/mathslither.html')">
                    <h3>SLITHER</h3>
                    <p>Klassieke Snake</p>
                </div>
                 <div class="game-card" onclick="openGame('https://games.engineering.com/2048/index.html')">
                    <h3>2048</h3>
                    <p>Brain Puzzle</p>
                </div>
                <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/42220-super-mario-bros-europe.html')">
                    <h3>MARIO</h3>
                    <p>Retro Emulator</p>
                </div>
                <div class="game-card" onclick="openGame('https://tetris.com/play-tetris')">
                    <h3>TETRIS</h3>
                    <p>Classic Blocks</p>
                </div>
            </div>
            <div id="esc-hint">Druk 5x snel op ESC om de rekenmachine terug te halen</div>
        </div>
    </div>

    <div id="game-zone" class="zone hidden">
        <div id="game-container">
            <button id="panic-button" onclick="resetToCalculator()">✖ Sluiten (of klik hier & 5x ESC)</button>
            <iframe id="game-frame" src=""></iframe>
        </div>
    </div>

    <script>
        // --- 1. VARIABELEN ---
        const calcDisplay = document.getElementById('display');
        const calcZone = document.getElementById('calculator-zone');
        const menuZone = document.getElementById('menu-zone');
        const gameZone = document.getElementById('game-zone');
        const frame = document.getElementById('game-frame');

        // --- 2. REKENMACHINE FUNCTIES ---
        // Zorgt ervoor dat we geen 'ERROR' tekst verder bewerken
        function appendValue(value) { 
            if (calcDisplay.value === 'ERROR') calcDisplay.value = '';
            calcDisplay.value += value; 
        }
        
        function clearDisplay() { 
            calcDisplay.value = ''; 
        }

        function calculate() {
            const input = calcDisplay.value;
            
            // GEHEIME CODE TRIGGER
            if (input === '1+1') {
                calcZone.classList.add('hidden');
                menuZone.classList.remove('hidden');
                clearDisplay();
                return;
            }
            
            // NORMALE REKENMACHINE
            if(input.trim() === '') return;
            try {
                // Vervang eventuele veilige tekens
                let safeInput = input.replace(/[^-()\d/*+.]/g, '');
                calcDisplay.value = Function('"use strict";return (' + safeInput + ')')();
            } catch (error) {
                calcDisplay.value = 'ERROR';
                setTimeout(clearDisplay, 1500);
            }
        }

        // --- 3. TOETSENBORD LOGICA (KEYBOARD SUPPORT) ---
        let escCount = 0;
        let lastEscTime = 0;

        document.addEventListener('keydown', (e) => {
            // Check of de rekenmachine momenteel in beeld is
            const isCalcVisible = !calcZone.classList.contains('hidden');

            if (isCalcVisible) {
                // Toegestane toetsen voor de rekenmachine
                if (/[0-9+\-*/.]/.test(e.key)) {
                    appendValue(e.key);
                } else if (e.key === 'Enter' || e.key === '=') {
                    calculate();
                } else if (e.key === 'Backspace') {
                    if (calcDisplay.value !== 'ERROR') {
                        calcDisplay.value = calcDisplay.value.slice(0, -1);
                    }
                } else if (e.key.toLowerCase() === 'c') {
                    clearDisplay();
                }
            }

            // ESCAPE FUNCTIES
            if (e.key === 'Escape') {
                if (isCalcVisible) {
                    // Als rekenmachine open is: 1x ESC = scherm wissen
                    clearDisplay();
                } else {
                    // Als game of menu open is: 5x ESC = reset naar rekenmachine
                    const currentTime = new Date().getTime();
                    if (currentTime - lastEscTime < 500) {
                        escCount++;
                    } else {
                        escCount = 1;
                    }
                    lastEscTime = currentTime;

                    if (escCount === 5) {
                        resetToCalculator();
                        escCount = 0; // Reset teller
                    }
                }
            }
        });

        // --- 4. GAME FUNCTIES ---
        function openGame(url) {
            menuZone.classList.add('hidden');
            gameZone.classList.remove('hidden');
            frame.src = url;
        }

        function resetToCalculator() {
            gameZone.classList.add('hidden');
            menuZone.classList.add('hidden');
            frame.src = ''; // Stop de game
            calcZone.classList.remove('hidden');
        }

        // --- 5. ACHTERGROND ANIMATIE (De Balletjes) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius) {
                    this.x -= dx/20;
                    this.y -= dy/20;
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = '#00f2fe';
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        let opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(0, 242, 254,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0,0,innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        initParticles();
        animate();
    </script>
</body>
</html>
